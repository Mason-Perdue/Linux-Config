font=monospace:weight=bold:size=20
dpi-aware=auto
prompt="> "
icon-theme=hicolor
icons-enabled=yes
terminal=alacritty
anchor=center
x-margin=0
y-margin=0
lines=3
width=30
horizontal-pad=10
vertical-pad=10
inner-pad=0

image-size-ratio=0

exit-on-keyboard-focus-loss=yes

[colors]
background=000000cc
text=ffffffff
prompt=ffffffff
input=ffffffff
match=ccccccff
selection=555555cc
selection-text=ffffffff
selection-match=ccccccff
border=ffffffcc

[border]
width=2
radius=10

[key-bindings]
cancel=Escape Control+g Control+c Control+bracketleft
execute=Return KP_Enter Control+y
execute-or-next=Tab
